name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN permissions needed to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; cancel in-progress runs of older commits
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Worker URL injected into the bundle. Set with:
          #   gh variable set VITE_SMS_ENDPOINT --body "https://tyrone-sms.<sub>.workers.dev"
          # If unset, the app falls back to simulation-only SMS.
          VITE_SMS_ENDPOINT: ${{ vars.VITE_SMS_ENDPOINT }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
