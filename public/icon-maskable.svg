<?xml version="1.0" encoding="UTF-8"?>
<!-- Maskable variant: same artwork but inset 20% so platforms can crop into any
     shape (circle, squircle, rounded-rect) without clipping the symbol. The
     full-bleed background extends to the edges. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#052e22"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="180" fill="url(#glow)"/>

  <!-- Radiation symbol scaled to fit inside the 80%-safe-zone -->
  <g transform="translate(256 256) scale(0.72)" fill="#34d399">
    <circle r="36" />
    <g>
      <path id="blade" d="M -54 -94 A 108 108 0 0 1 54 -94 L 26 -45 A 52 52 0 0 0 -26 -45 Z"/>
      <use href="#blade" transform="rotate(120)"/>
      <use href="#blade" transform="rotate(240)"/>
    </g>
  </g>
</svg>
