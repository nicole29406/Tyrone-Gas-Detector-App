name = "tyrone-sms"
main = "src/index.js"
compatibility_date = "2024-09-23"

# Secrets are NOT defined here — they live in Cloudflare's secret store.
# Set them with:
#   cd worker
#   wrangler secret put TWILIO_ACCOUNT_SID
#   wrangler secret put TWILIO_AUTH_TOKEN
#   wrangler secret put TWILIO_FROM_NUMBER
#
# After deploying with `wrangler deploy` you'll get a URL like:
#   https://tyrone-sms.<your-subdomain>.workers.dev
# Use that URL as the VITE_SMS_ENDPOINT repo variable
# (the deploy.yml workflow reads it and bakes it into the production build).
